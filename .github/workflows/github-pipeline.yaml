name: Trampolin Judge CLI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  checkout-git-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
      unique_tag: ${{ steps.get_tag.outputs.unique_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag on triggering commit
        id: get_tag
        shell: bash
        run: |
          git fetch --force --tags

          # For push events this is the pushed commit; for PRs this is the workflow SHA.
          SHA="${GITHUB_SHA}"
          SHORT_SHA="${GITHUB_SHA::7}"

          TAG="$(git tag --points-at "$SHA" | head -n 1)"

          if [ -n "$TAG" ]; then
            echo "Version: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "unique_tag=${TAG}-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "Version: latest"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "unique_tag=latest-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi
      
  build-and-push-images:
    needs: checkout-git-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push test image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/trampolin:${{ needs.checkout-git-tag.outputs.unique_tag }}-test
      - name: Build and push Integration test image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/trampolin:${{ needs.checkout-git-tag.outputs.unique_tag }}-integration
      - name: Build and push Production test image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/trampolin:${{ needs.checkout-git-tag.outputs.unique_tag }}-production
      - name: Build and push production deploy image
        if: needs.checkout-git-tag.outputs.tag != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/trampolin:${{ needs.checkout-git-tag.outputs.tag }}
  
  run-tests:
    needs: [checkout-git-tag, build-and-push-images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Pull test image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/trampolin:${{ needs.checkout-git-tag.outputs.unique_tag }}-test
      - name: Run Unit tests
        run: |
          export IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/trampolin
          export IMAGE_TAG=${{ needs.checkout-git-tag.outputs.unique_tag }}-test
          export TEST_COMMAND="npx vitest run tests/unit"
          cd compose/test
          docker compose -f docker-compose.yaml run --rm test-runner
      - name: Run API tests
        run: |
          export IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/trampolin
          export IMAGE_TAG=${{ needs.checkout-git-tag.outputs.unique_tag }}-test
          export TEST_COMMAND="npx vitest run tests/api"
          cd compose/test
          docker compose -f docker-compose.yaml run --rm test-runner
      - name: Run Component tests
        run: |
          export IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/trampolin
          export IMAGE_TAG=${{ needs.checkout-git-tag.outputs.unique_tag }}-test
          export TEST_COMMAND="npx playwright test tests/component"
          cd compose/test
          docker compose -f docker-compose.yaml run --rm test-runner
      - name: Run Integration tests
        run: |
          chmod +x scripts/run-integration-tests.sh 
          ./scripts/run-integration-tests.sh  --production-image \
          ${{ secrets.DOCKER_USERNAME }}/trampolin:${{ needs.checkout-git-tag.outputs.unique_tag }}-production \
          --test-image ${{ secrets.DOCKER_USERNAME }}/trampolin:${{ needs.checkout-git-tag.outputs.unique_tag }}-integration
